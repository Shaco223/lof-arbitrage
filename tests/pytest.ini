[pytest]
testpaths = ac contract e2e
pythonpath = .
python_files = AC-*.test.py *_test.py test_*.py
markers =
    ac_p: AC-P 精度类
    ac_c: AC-C 完整度类
    ac_h: AC-H 历史与分位
    ac_a: AC-A 告警
    ac_i: AC-I 接口
    ac_s: AC-S 架构与配额
    ac_t: AC-T 透明度
    contract: PRD §6 静态接口契约校验
    ac_hard: 硬约束（AC-T1 / AC-S3 / AC-S1），任一不通过禁止放行
    pending: 测试骨架尚未填实，自动 skip
addopts = -ra --import-mode=importlib
